<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Assault</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #05050f;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #gameCanvas {
      display: block;
      /* Preserve pixel art crispness */
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      /* Scale to fit viewport while keeping 4:3 aspect ratio */
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      aspect-ratio: 800 / 600;
    }

    /* Ensure canvas fills available space */
    @media (min-aspect-ratio: 4/3) {
      #gameCanvas { height: 100vh; width: auto; }
    }
    @media (max-aspect-ratio: 4/3) {
      #gameCanvas { width: 100vw; height: auto; }
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <!-- Scripts loaded in dependency order — no ES modules (works on file://) -->
  <script src="js/constants.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/input.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/bullet.js"></script>
  <script src="js/enemy.js"></script>
  <script src="js/player.js"></script>
  <script src="js/wave.js"></script>
  <script src="js/levels.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
